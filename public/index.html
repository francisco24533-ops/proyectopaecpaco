
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Lavanda</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    img {
      width: 200px;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>🌱 Registro de Crecimiento de Lavanda</h1>

<input id="alumno" placeholder="Nombre del alumno">
<input id="altura" type="number" placeholder="Altura (cm)">
<input id="fecha" type="date">

<input id="imagen" type="file">

<button onclick="guardar()">Guardar</button>

<h2>📋 Registros:</h2>

<div id="lista"></div>

<script>

async function guardar() {

  const alumno = document.getElementById("alumno").value;
  const altura = document.getElementById("altura").value;
  const fecha = document.getElementById("fecha").value;
  const imagen = document.getElementById("imagen").files[0];

  const formData = new FormData();

  formData.append("alumno", alumno);
  formData.append("altura", altura);
  formData.append("fecha", fecha);
  formData.append("imagen", imagen);

  await fetch("/registros", {
    method: "POST",
    body: formData
  });

  cargar();
}

async function cargar() {

  const res = await fetch("/registros");
  const data = await res.json();

  const lista = document.getElementById("lista");

  lista.innerHTML = "";

  data.forEach(r => {

    lista.innerHTML += `
      <div class="card">
        <h3>${r.alumno}</h3>
        <p>🌱 Altura: ${r.altura} cm</p>
        <p>📅 Fecha: ${r.fecha}</p>

        ${r.imagen ? `<img src="${r.imagen}">` : ""}
      </div>
    `;
  });
}

cargar();

</script>

</body>
</html>
