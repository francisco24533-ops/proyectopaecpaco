<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Lavanda App</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>

<!-- MENU -->
<div class="sidebar">

  <h2>🌱 Lavanda</h2>

  <button onclick="mostrarSeccion('inicio')">
    🏠 Inicio
  </button>

  <button onclick="mostrarSeccion('registros')">
    🌱 Registros
  </button>

  <button onclick="mostrarSeccion('articulos')">
    📰 Artículos
  </button>

  <button onclick="mostrarSeccion('diagramas')">
    📊 Diagramas
  </button>

  <button onclick="mostrarSeccion('tutoriales')">
    🎥 Tutoriales
  </button>

  <button onclick="mostrarLogin()">
    🔐 Entrar
  </button>

</div>

<!-- CONTENIDO -->
<div class="contenido">

  <!-- INICIO -->
  <section id="inicio" class="seccion activa">

    <h1>🌱 ¿Qué es la Lavanda?</h1>

    <p>
      La lavanda es una planta aromática conocida
      por su agradable olor y propiedades relajantes.
    </p>

    <img
    class="imagenInicio"
    src="https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?q=80&w=1200">

  </section>

  <!-- PANEL REGISTRADOR -->
  <section id="panelRegistro" class="seccion">

    <h1>✍ Panel Registrador</h1>

    <!-- REGISTRO -->
    <div class="card">

      <h2>🌱 Nuevo Registro</h2>

      <input type="text" id="alumno" placeholder="Nombre">

      <input type="number" id="altura" placeholder="Altura">

      <input type="date" id="fecha">

      <input type="file" id="imagenRegistro">

      <button onclick="crearRegistro()">
        Guardar Registro
      </button>

    </div>

    <!-- ARTICULOS -->
    <div class="card">

      <h2>📰 Crear Artículo</h2>

      <input type="text" id="tituloArticulo" placeholder="Título">

      <textarea
      id="contenidoArticulo"
      rows="5"
      placeholder="Contenido"></textarea>

      <input type="file" id="imagenArticulo">

      <button onclick="crearArticulo()">
        Publicar Artículo
      </button>

    </div>

    <!-- DIAGRAMAS -->
    <div class="card">

      <h2>📊 Crear Diagrama</h2>

      <input type="text" id="tituloDiagrama" placeholder="Título">

      <input type="file" id="imagenDiagrama">

      <button onclick="crearDiagrama()">
        Publicar Diagrama
      </button>

    </div>

    <!-- TUTORIALES -->
    <div class="card">

      <h2>🎥 Crear Tutorial</h2>

      <input type="text" id="tituloTutorial" placeholder="Título">

      <input type="text" id="linkTutorial" placeholder="Link YouTube">

      <button onclick="crearTutorial()">
        Publicar Tutorial
      </button>

    </div>

  </section>

  <!-- REGISTROS -->
  <section id="registros" class="seccion">

    <h1>🌱 Registros</h1>

    <div id="listaRegistros"></div>

  </section>

  <!-- ARTICULOS -->
  <section id="articulos" class="seccion">

    <h1>📰 Artículos</h1>

    <div id="listaArticulos"></div>

  </section>

  <!-- DIAGRAMAS -->
  <section id="diagramas" class="seccion">

    <h1>📊 Diagramas</h1>

    <div id="listaDiagramas"></div>

  </section>

  <!-- TUTORIALES -->
  <section id="tutoriales" class="seccion">

    <h1>🎥 Tutoriales</h1>

    <div id="listaTutoriales"></div>

  </section>

</div>

<!-- LOGIN -->
<div class="login oculto" id="login">

  <div class="login-box">

    <h2>🔐 Login</h2>

    <select id="tipoUsuario">

      <option value="visitante">
        Visitante
      </option>

      <option value="registro">
        Registrador
      </option>

      <option value="admin">
        Administrador
      </option>

    </select>

    <input
    type="password"
    id="password"
    placeholder="Contraseña">

    <button onclick="entrar()">
      Entrar
    </button>

    <button onclick="cerrarLogin()">
      Cancelar
    </button>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
